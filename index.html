<head>
<title>Brux Night Guard</title>

<style type= "text/css">
/*-- Use #content CSS to customize size, position, border, etc of your 360 view --*/
body, html
{
	/* height is intentionally NOT 100% -- letting the page be as tall as the
	   viewer (#content) avoids a tall viewport leaving large empty white space
	   below the guard on mobile. overflow-x:hidden prevents any horizontal
	   scroll; vertical overflow is left visible so an open hotspot popup that
	   extends past the viewer isn't clipped. */
	width: 100%;
	overflow-x: hidden;
	margin: 0;
	padding: 0;
	background: transparent;
	border: 0 !important;
	outline: 0 !important;
	box-shadow: none !important;
}
#content
{
    width: 100%;
    height: auto;
    aspect-ratio: 515 / 320;
    max-width: 680px;
    margin: 0 auto;
    border: none !important;
	max-height: 600px;
	position: relative;
	background: transparent;
	outline: 0 !important;
	box-shadow: none !important;
}

#wr360PlayerId {
    position: relative;
    z-index: 2;
    background: transparent !important;
	border: 0 !important;
	outline: 0 !important;
	box-shadow: none !important;
}

/* Remove all possible borders from viewer elements */
.wr360_player,
.wr360_player *,
.wr360_viewer,
.wr360_viewport {
	border: 0 !important;
	outline: 0 !important;
	box-shadow: none !important;
}

/* Clean load: keep the loading placeholder image OUT of normal flow.
   Otherwise the placeholder occupies full height and the interactive viewer
   renders stacked BELOW it during load (two guards stacked vertically), then
   jumps up when the placeholder is hidden. Absolute-positioning it makes the
   viewer render in the same spot so the swap is a clean in-place fade. */
.wr360_player .stub_banner_wrap {
	position: absolute !important;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	height: 100% !important;
	z-index: 1;
}

/* Force white toolbar buttons with multiple selectors */
.wr360_player .wr360_toolbar a,
.wr360_player .wr360_toolbar button,
.wr360_player .wr360_toolbar div[onclick] {
    filter: brightness(0) invert(1) !important;
    -webkit-filter: brightness(0) invert(1) !important;
}

.wr360_player .wr360_toolbar img {
    filter: brightness(0) invert(1) !important;
    -webkit-filter: brightness(0) invert(1) !important;
}

/* Target SVG files specifically */
.wr360_player .wr360_toolbar img[src$=".svg"] {
    filter: brightness(0) invert(1) !important;
    -webkit-filter: brightness(0) invert(1) !important;
}

.wr360_player .wr360_toolbar svg,
.wr360_player .wr360_toolbar svg *,
.wr360_player .wr360_toolbar path,
.wr360_player .wr360_toolbar polygon {
    fill: #ffffff !important;
    stroke: #ffffff !important;
}

/* Toolbar styling - move up from bottom and add more space */
.wr360_player .wr360_toolbar {
    background: transparent !important;
    position: relative !important;
    margin-top: -70px !important;
    padding: 20px 0 30px 0 !important;
    overflow: visible !important;
}

/* Lay the toolbar out as a centered flex row and reorder so the
   play/pause toggle sits in the MIDDLE: rotate-left, play/pause, rotate-right */
.wr360_player .wr360_toolbar,
.wr360_player .toolbar {
    display: flex !important;
    flex-direction: row !important;
    justify-content: center !important;
    align-items: center !important;
}
.wr360_player .left_button  { order: 1 !important; }
.wr360_player .play_button,
.wr360_player .pause_button { order: 2 !important; }
.wr360_player .right_button { order: 3 !important; }

/* Hide specific unwanted buttons by class name.
   These need the SAME high specificity as the ".toolbar > a { display:block }"
   sizing rule below, or they stay visible AND keep taking flex space, which
   shoves the real buttons off-center. (fullscreen/hotspot toggles were doing
   exactly that — invisible but occupying two slots on the left.) */
.wr360_player .container .theme_panel .toolbar a.up_button,
.wr360_player .container .theme_panel .toolbar a.down_button,
.wr360_player .container .theme_panel .toolbar a.zoomin_button,
.wr360_player .container .theme_panel .toolbar a.zoomout_button,
.wr360_player .container .theme_panel .toolbar a.fullscreenon_button,
.wr360_player .container .theme_panel .toolbar a.fullscreenoff_button,
.wr360_player .container .theme_panel .toolbar a.hotspotson_button,
.wr360_player .container .theme_panel .toolbar a.hotspotsoff_button {display: none !important;}

/* FORCE HIDE all unwanted buttons */
.wr360_player .wr360_btn_hotspots,
.wr360_player .wr360_btn_zoom_in,
.wr360_player .wr360_btn_zoom_out,
.wr360_player .wr360_btn_fullscreen,
.wr360_player a[class*="zoom"],
.wr360_player a[class*="fullscreen"],
.wr360_player a[class*="hotspot"],
.wr360_player button[class*="zoom"],
.wr360_player button[class*="fullscreen"],
.wr360_player button[class*="hotspot"] {
    display: none !important;
    visibility: hidden !important;
}

/* Button spacing and sizing - MORE SPECIFIC to override basic.css */
.wr360_player .container .theme_panel .toolbar > a,
.wr360_player .wr360_toolbar a,
.wr360_player .wr360_toolbar button {
    /* No top margin: it pushed the buttons down out of vertical-center and past
       the toolbar's bottom edge (clipping them). 0 top/bottom + align-items:center
       keeps the 32px buttons centered in the toolbar. */
    margin: 0 5px !important;
    padding: 0 !important;
    display: block !important;
    float: left !important;
    width: 32px !important;
    height: 32px !important;
    /* In the flex toolbar, keep buttons a fixed 32px box so they never shrink
       horizontally (which clipped the round icons to flat-sided ovals). */
    flex: 0 0 32px !important;
    box-sizing: border-box !important;
    background-size: contain !important;
    background-repeat: no-repeat !important;
    background-position: center !important;
    opacity: 1 !important;
    overflow: visible !important;
}

/* Make button icons proper size - 28px SVGs with circles */
.wr360_player .container .theme_panel .toolbar > a img,
.wr360_player .wr360_toolbar img {
    width: 32px !important;
    height: 32px !important;
    transform: none !important;
    filter: none !important;
    -webkit-filter: none !important;
    display: block !important;
}

/* Change hotspot pulse ring color from white to blue */
.wr360_player .wr360_hotspot_outer,
.wr360_player .wr360_hotspot_pulse,
.wr360_player [class*="hotspot"][class*="pulse"],
.wr360_player [class*="pulse"][class*="outer"] {
    border-color: #1E90FF !important;
    background-color: rgba(30, 144, 255, 0.3) !important;
}

/* Target the pulsing animation elements */
.wr360_player div[style*="animation"],
.wr360_player div[style*="opacity"] {
    border-color: #1E90FF !important;
}

/* Make sure product images are NOT filtered */
.wr360_player canvas,
.wr360_player .wr360_viewer img,
.wr360_player .wr360_viewport img,
.wr360_player img[src*="brux-night-guard"] {
    filter: none !important;
    -webkit-filter: none !important;
}

/* --- Hotspot popup card --- */
/* The ".wr360_player * { border:0 !important; box-shadow:none !important }" reset
   above strips the card's border/shadow (and the title divider). Re-assert them here
   with higher specificity + !important so they actually show on the visible card box.
   The card box is the direct <div> child of .hotspot_rollover (carries the inline css attr). */
.wr360_player .hotspot_rollover > div {
    border: 1px solid #d0d0d0 !important;
    border-radius: 14px !important;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25) !important;
    background: #ffffff !important;
}
.wr360_player .hotspot_rollover .bng-eyebrow {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #f96d20;
    margin: 0 0 6px 0;
}
.wr360_player .hotspot_rollover .bng-title {
    display: block;
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.3;
    padding-bottom: 10px;
    margin: 0 0 12px 0;
    border-bottom: 1px solid #cfcfcf !important;
}
.wr360_player .hotspot_rollover .bng-body {
    display: block;
    font-size: 14px;
    line-height: 1.6;
    color: #444444;
    margin: 0 0 16px 0;
}
.wr360_player .hotspot_rollover .bng-buy,
.wr360_player .hotspot_rollover .bng-buy:link,
.wr360_player .hotspot_rollover .bng-buy:visited {
    display: inline-block;
    font-size: 14px;
    font-weight: 700;
    color: #f96d20 !important;
    text-decoration: none;
}
.wr360_player .hotspot_rollover .bng-buy:hover {
    text-decoration: underline;
}

</style>
<!-- 
    Copy this script block and paste under your page <head> section or somewhere inside your page <body>.
    See API sections in the user guide for more details: https://webrotate360.s3.amazonaws.com/sites/webrotate360/downloads/Resources/Readme.pdf
-->
<script type="text/javascript">
jQuery(document).ready(function(){
  var player = jQuery('#wr360PlayerId').rotator({
    licenseFileURL: 'license.lic',
    configFileURL: '360_assets/Brux Night Guard/Brux Night Guard.xml',
    graphicsPath: 'imagerotator/html/img/basic',
    alt: '360 degree view - Brux Night Guard',
    googleEventTracking: false,
  });
  
  // Sync the player element to the container size.
  function resizePlayer() {
    var w = jQuery('#content').width();
    var h = jQuery('#content').height();
    jQuery('#wr360PlayerId').css({ width: w, height: h });
  }

  // WebRotate only re-fits its image to the container on a real window 'resize'
  // event -- NOT when the container is resized programmatically, and NOT when the
  // viewport width changes after init (e.g. opening Chrome's device toolbar, a
  // phone settling its layout, or an iframe being sized by the host page). In
  // those cases the image stays sized to the initial width and gets pushed off /
  // cropped to the right until you manually resize. Firing a synthetic resize
  // forces WebRotate to re-fit so the guard stays centered and fully visible.
  // (The old code called player.resize(w,h) here, but `player` is a jQuery object
  // so that hit jQuery's .resize() event binder and threw -- it never resized.)
  function nudgeRefit() {
    resizePlayer();
    window.dispatchEvent(new Event('resize'));
  }

  // Debounce function to prevent too many resize calls
  var resizeTimer;
  function debouncedResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizePlayer, 250);
  }

  // Initial resize
  resizePlayer();

  // Listen to window resize
  jQuery(window).on('resize', debouncedResize);

  // Force a re-fit after load settles, to catch late layout / viewport changes
  // (device toolbar, late-loading frames, host iframe sizing).
  setTimeout(nudgeRefit, 300);
  setTimeout(nudgeRefit, 800);
  setTimeout(nudgeRefit, 1500);
  
  // Aggressive white button forcing - target all toolbar elements
  function forceWhiteButtons() {
    // Find and invert all toolbar buttons/images
    jQuery('.wr360_player .wr360_toolbar').find('*').each(function() {
      var $el = jQuery(this);
      // Skip if it's a product image
      if (!$el.attr('src') || !$el.attr('src').includes('brux-night-guard')) {
        if ($el.is('img') || $el.is('a') || $el.is('button') || $el.attr('onclick')) {
          $el.css({
            'filter': 'brightness(0) invert(1)',
            '-webkit-filter': 'brightness(0) invert(1)'
          });
        }
        if ($el.is('svg') || $el.is('path') || $el.is('polygon')) {
          $el.css({
            'fill': '#ffffff',
            'stroke': '#ffffff'
          });
        }
      }
    });
  }
  
  // Force multiple times
  setTimeout(forceWhiteButtons, 100);
  setTimeout(forceWhiteButtons, 500);
  setTimeout(forceWhiteButtons, 1000);
  setTimeout(forceWhiteButtons, 2000);
});
</script>
<!-- End of script copy / paste -->
</head>
<body>
    <!-- Just copy / paste the content div below onto your page and define content CSS styles as needed -->
    <div id="content">
        <div
  id="wr360PlayerId"
  class="wr360_player"
  style="width:100%; height:100%; background-color:transparent;">
            <div class="stub_banner_wrap" style="height:100%;">
                <div class="stub_banner">
                    <img src="360_assets/Brux Night Guard/images/brux-night-guard-0.png" alt="" />
                </div>
            </div>
        </div>
    </div>
</body>
